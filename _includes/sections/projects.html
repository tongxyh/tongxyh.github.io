<h1><span data-i18n="skills.my_skills">Projects</span></h1>

{% for project in site.data.index.projects %}
    <div class="row project-item">
            <div class="col">
                <h2>{{ project.name }}</h2>
                <p>{{ project.descr }}</p>
                {% if project.github %}
                <a href="{{ project.github }}" target="_blank" rel="noopener noreferrer"><i class="fa fa-fw fa-github"></i>GitHub</a>
                {% endif %}
                {% if project.website and project.website != project.github %}
                <a href="{{ project.website }}" target="_blank" rel="noopener noreferrer"><i class="fa fa-fw fa-globe"></i>Homepage</a>
                {% endif %}
                {% if project.image %}
                <div class="project-image">
                    <img src="{{site.url}}/img/{{ project.image }}" alt="{{ project.name }}">
                </div>
                {% endif %}</div>
            </div>
    </div>
{% endfor %}
